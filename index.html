<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Le Carnet du Potager — Suivi de culture</title>
<meta name="theme-color" content="#5c6e54">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Potager">
<meta name="description" content="Carnet de potager : suivez vos cultures du semis à la récolte. Calendrier cultural, rappels d'arrosage, journal, rotation des cultures et compagnonnage pour ~40 légumes et aromatiques.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --bg-sand:#FAF7F2; --bg-sand-dark:#F2EBE1; --cream:#FFFDFB;
 --ink-deep:#1F2D24; --ink-soft:#4a5a4f;
 --gold:#C2A26A; --sage:#7D8E74; --sage-dark:#5c6e54;
 --terracotta:#C36A4B; --terracotta-dark:#9F4F33;
 --tomato:#c0432e; --carrot:#d98032; --leaf:#6f8c4e; --soil:#7c5a3a;
 --line:rgba(31,45,36,.10);
 --glass:rgba(255,253,251,.78);
 --shadow:0 18px 50px -14px rgba(31,45,36,.20),0 6px 16px -8px rgba(31,45,36,.14);
 --shadow-sm:0 6px 18px -10px rgba(31,45,36,.22);
 --primary-serif:'Cormorant Garamond',Georgia,serif;
 --primary-sans:'Montserrat',sans-serif;
 --ease:cubic-bezier(.22,1,.36,1);
 --r:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--primary-sans);background:var(--bg-sand);color:var(--ink-deep);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:80px}
h1,h2,h3,.serif{font-family:var(--primary-serif)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:.95rem;color:var(--ink-deep)}
.wrap{max-width:1180px;margin:0 auto;padding:0 22px}
.hidden{display:none!important}

/* Header */
header{position:sticky;top:0;z-index:60;background:var(--glass);backdrop-filter:blur(22px) saturate(165%);-webkit-backdrop-filter:blur(22px) saturate(165%);border-bottom:1px solid var(--line)}
.hbar{display:flex;align-items:center;justify-content:space-between;height:68px}
.logo{display:flex;align-items:center;gap:11px;font-family:var(--primary-serif);font-size:1.5rem;font-weight:600;letter-spacing:.3px}
.logo .mark{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--sage),var(--sage-dark));display:grid;place-items:center;font-size:1.2rem;box-shadow:var(--shadow-sm)}
.logo small{display:block;font-family:var(--primary-sans);font-size:.6rem;font-weight:500;letter-spacing:3px;text-transform:uppercase;color:var(--gold)}
nav.desk{display:flex;gap:4px}
nav.desk button{padding:9px 15px;border-radius:30px;font-size:.82rem;font-weight:500;color:var(--ink-soft);transition:.25s var(--ease)}
nav.desk button:hover{background:rgba(125,142,116,.12);color:var(--ink-deep)}
nav.desk button.active{background:var(--ink-deep);color:var(--cream)}
.burger{display:none;font-size:1.5rem;padding:6px 10px;border-radius:12px}

/* Mobile bottom nav */
.mnav{position:fixed;bottom:0;left:0;right:0;z-index:60;display:none;background:var(--glass);backdrop-filter:blur(22px);border-top:1px solid var(--line);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}
.mnav .row{display:flex;justify-content:space-around;overflow-x:auto}
.mnav button{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:.62rem;font-weight:500;color:var(--ink-soft);padding:4px 8px;border-radius:12px;flex:0 0 auto}
.mnav button .ic{font-size:1.15rem}
.mnav button.active{color:var(--sage-dark)}

/* Hero */
.hero{padding:60px 0 30px;text-align:center}
.hero .badge{display:inline-block;font-size:.66rem;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border:1px solid var(--gold);border-radius:30px;padding:6px 16px;margin-bottom:22px}
.hero h1{font-size:clamp(2.6rem,6vw,4.4rem);font-weight:600;line-height:1.05;margin-bottom:16px}
.hero h1 em{font-style:italic;color:var(--sage-dark)}
.hero p{max-width:620px;margin:0 auto 28px;color:var(--ink-soft);font-size:1.08rem}
.hero .cta{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.statline{display:flex;gap:34px;justify-content:center;margin-top:42px;flex-wrap:wrap}
.statline .s{text-align:center}
.statline .s b{display:block;font-family:var(--primary-serif);font-size:2.2rem;color:var(--sage-dark);font-weight:600}
.statline .s span{font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-soft)}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:30px;font-size:.85rem;font-weight:500;transition:.25s var(--ease)}
.btn-primary{background:var(--sage-dark);color:var(--cream);box-shadow:var(--shadow-sm)}
.btn-primary:hover{background:var(--ink-deep);transform:translateY(-2px)}
.btn-ghost{border:1px solid var(--line);background:var(--cream);color:var(--ink-deep)}
.btn-ghost:hover{border-color:var(--sage);background:#fff}
.btn-sm{padding:7px 14px;font-size:.76rem}
.btn-terra{background:var(--terracotta);color:#fff}
.btn-terra:hover{background:var(--terracotta-dark)}

/* Section header */
section.view{padding:34px 0 20px}
.sec-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:22px;flex-wrap:wrap}
.sec-head h2{font-size:2.2rem;font-weight:600}
.sec-head .sub{color:var(--ink-soft);font-size:.92rem;margin-top:2px}
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.toolbar input[type=search],.toolbar select{padding:10px 14px;border-radius:30px;border:1px solid var(--line);background:var(--cream);outline:none;transition:.2s}
.toolbar input[type=search]:focus,.toolbar select:focus{border-color:var(--sage)}
.chip{padding:7px 14px;border-radius:30px;border:1px solid var(--line);background:var(--cream);font-size:.78rem;font-weight:500;color:var(--ink-soft);transition:.2s}
.chip:hover{border-color:var(--sage)}
.chip.active{background:var(--sage-dark);color:var(--cream);border-color:var(--sage-dark)}

/* Cards grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px}
.card{background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);transition:.3s var(--ease);position:relative;overflow:hidden}
.card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:rgba(194,162,106,.4)}
.card .ph{height:140px;border-radius:12px;margin:-2px -2px 14px;display:grid;place-items:center;font-size:3rem;background:linear-gradient(135deg,#eef1e8,#e3ddcf);position:relative;overflow:hidden;cursor:zoom-in}
.fiche-hero{position:relative;height:230px;border-radius:14px;margin:0 0 14px;display:grid;place-items:center;font-size:4.4rem;background:linear-gradient(135deg,#eef1e8,#e3ddcf);overflow:hidden;cursor:zoom-in}
.vimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:inherit;opacity:0;transition:opacity .45s var(--ease)}
.vimg.on{opacity:1}
.ph .emo,.fiche-hero .emo{position:relative;z-index:0}
.vthumb{position:relative;display:inline-grid;place-items:center;width:30px;height:30px;min-width:30px;border-radius:8px;overflow:hidden;background:linear-gradient(135deg,#eef1e8,#e3ddcf);font-size:1.05rem;vertical-align:middle;cursor:zoom-in;flex:none;transition:box-shadow .15s var(--ease)}
.vthumb:hover{box-shadow:0 0 0 2px var(--carrot)}
.vthumb .emo{position:relative;z-index:0;line-height:1}
.namecell{display:inline-flex;align-items:center;gap:8px}
.imgbox{position:fixed;inset:0;z-index:1000;background:rgba(28,25,20,.82);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:grid;place-items:center;padding:24px;opacity:0;transition:opacity .25s var(--ease);cursor:zoom-out}
.imgbox.on{opacity:1}
.imgbox-inner{position:relative;max-width:min(680px,92vw);width:100%;background:#fffdf7;border-radius:18px;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.45);transform:scale(.96);transition:transform .25s var(--ease)}
.imgbox.on .imgbox-inner{transform:scale(1)}
.imgbox-photo{position:relative;width:100%;aspect-ratio:4/3;display:grid;place-items:center;font-size:5rem;background:linear-gradient(135deg,#eef1e8,#e3ddcf)}
.imgbox-cap{padding:14px 18px}
.imgbox-cap b{font-size:1.3rem;font-weight:600}
.imgbox-cap small{display:block;font-style:italic;color:var(--ink-soft);margin-top:2px}
.imgbox-x{position:absolute;top:10px;right:10px;z-index:2;width:34px;height:34px;border:none;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;font-size:1rem;cursor:pointer;display:grid;place-items:center}
.imgbox-x:hover{background:rgba(0,0,0,.72)}
.card h3{font-size:1.4rem;font-weight:600;line-height:1.1}
.card .lat{font-style:italic;font-size:.8rem;color:var(--ink-soft);margin-bottom:8px}
.tag{display:inline-block;font-size:.64rem;letter-spacing:.6px;text-transform:uppercase;padding:3px 9px;border-radius:20px;background:rgba(125,142,116,.14);color:var(--sage-dark);font-weight:600;margin:2px 3px 2px 0}
.tag.fam{background:rgba(194,162,106,.16);color:#8a6d33}
.tag.warn{background:rgba(195,106,75,.16);color:var(--terracotta-dark)}
.tag.ok{background:rgba(111,140,78,.18);color:#4d6531}
.metaline{display:flex;gap:14px;flex-wrap:wrap;font-size:.75rem;color:var(--ink-soft);margin-top:10px}
.metaline b{color:var(--ink-deep);font-weight:600}

/* status dot */
.status{display:inline-flex;align-items:center;gap:6px;font-size:.74rem;font-weight:600}
.dot{width:9px;height:9px;border-radius:50%}
.st-seme .dot{background:var(--soil)} .st-seme{color:var(--soil)}
.st-croissance .dot{background:var(--leaf)} .st-croissance{color:#4d6531}
.st-recolte .dot{background:var(--carrot)} .st-recolte{color:#a85d1e}
.st-termine .dot{background:#9aa0a6} .st-termine{color:#777}

/* progress */
.prog{height:7px;border-radius:10px;background:#e7e1d4;overflow:hidden;margin-top:10px}
.prog>i{display:block;height:100%;background:linear-gradient(90deg,var(--sage),var(--carrot))}

/* Calendar */
.calwrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--cream)}
table.cal{border-collapse:collapse;width:100%;min-width:820px;font-size:.78rem}
table.cal th,table.cal td{padding:7px 6px;text-align:center;border-bottom:1px solid var(--line)}
table.cal th{position:sticky;top:0;background:var(--bg-sand-dark);font-weight:600;font-size:.72rem;letter-spacing:.5px}
table.cal td.name{text-align:left;white-space:nowrap;font-weight:500;padding-left:14px}
table.cal th.now,table.cal td.now{background:rgba(194,162,106,.12)}
.cellbar{height:16px;border-radius:5px;width:100%}
.b-semis{background:repeating-linear-gradient(45deg,var(--soil),var(--soil) 5px,#8d6845 5px,#8d6845 10px)}
.b-recolte{background:var(--carrot)}
.b-both{background:linear-gradient(90deg,var(--soil) 50%,var(--carrot) 50%)}
.calleg{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;font-size:.78rem;color:var(--ink-soft)}
.calleg span{display:inline-flex;align-items:center;gap:7px}
.swatch{width:18px;height:12px;border-radius:4px;display:inline-block}

/* Tasks */
.tasklist{display:flex;flex-direction:column;gap:10px}
.task{display:flex;align-items:center;gap:14px;background:var(--cream);border:1px solid var(--line);border-left:4px solid var(--sage);border-radius:14px;padding:13px 16px;box-shadow:var(--shadow-sm)}
.task.urgent{border-left-color:var(--terracotta)}
.task.soon{border-left-color:var(--carrot)}
.task .ti{font-size:1.3rem;width:30px;text-align:center}
.task .body{flex:1}
.task .body b{font-weight:600}
.task .body small{display:block;color:var(--ink-soft);font-size:.76rem}
.task .when{font-size:.74rem;font-weight:600;white-space:nowrap}

/* Dashboard */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin-bottom:26px}
.stat{background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--shadow-sm)}
.stat b{display:block;font-family:var(--primary-serif);font-size:2.4rem;font-weight:600;color:var(--sage-dark);line-height:1}
.stat span{font-size:.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft)}
.barrow{display:flex;align-items:center;gap:12px;margin-bottom:9px}
.barrow .lab{width:140px;font-size:.8rem;text-align:right;color:var(--ink-soft)}
.barrow .track{flex:1;height:22px;background:#ece6d9;border-radius:7px;overflow:hidden}
.barrow .track>i{display:block;height:100%;background:linear-gradient(90deg,var(--sage),var(--sage-dark));border-radius:7px}
.barrow .val{width:40px;font-size:.8rem;font-weight:600}

/* Parcelles */
.parcelle{background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:18px;box-shadow:var(--shadow-sm);margin-bottom:16px}
.parcelle h3{font-size:1.5rem;font-weight:600;display:flex;align-items:center;gap:10px}
.parcelle .plist{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.pchip{display:inline-flex;align-items:center;gap:7px;background:var(--bg-sand-dark);border-radius:30px;padding:6px 13px;font-size:.8rem;font-weight:500}
.rot-alert{background:rgba(195,106,75,.1);border:1px solid rgba(195,106,75,.3);color:var(--terracotta-dark);border-radius:12px;padding:11px 14px;font-size:.82rem;margin-top:12px;display:flex;gap:9px;align-items:flex-start}
.rot-ok{background:rgba(111,140,78,.1);border:1px solid rgba(111,140,78,.3);color:#4d6531;border-radius:12px;padding:11px 14px;font-size:.82rem;margin-top:12px}

/* Drawer & modal */
.overlay{position:fixed;inset:0;background:rgba(31,45,36,.42);backdrop-filter:blur(4px);z-index:90;opacity:0;pointer-events:none;transition:.3s}
.overlay.show{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;height:100%;width:min(480px,100%);background:var(--bg-sand);z-index:100;box-shadow:-20px 0 60px rgba(31,45,36,.25);transform:translateX(100%);transition:.4s var(--ease);overflow-y:auto}
.drawer.show{transform:translateX(0)}
.drawer .dhead{position:sticky;top:0;background:var(--glass);backdrop-filter:blur(20px);padding:20px 24px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
.drawer .dhead h2{font-size:1.9rem;font-weight:600;line-height:1.05}
.drawer .dhead .lat{font-style:italic;color:var(--ink-soft);font-size:.85rem}
.drawer .dbody{padding:22px 24px 60px}
.close{font-size:1.5rem;line-height:1;padding:4px 10px;border-radius:10px;color:var(--ink-soft)}
.close:hover{background:rgba(0,0,0,.05)}
.modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-46%) scale(.97);width:min(520px,94vw);max-height:88vh;overflow-y:auto;background:var(--bg-sand);border-radius:22px;z-index:100;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.3s var(--ease)}
.modal.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.modal .mhead{padding:22px 24px 6px}
.modal .mhead h2{font-size:1.7rem;font-weight:600}
.modal .mbody{padding:6px 24px 24px}

/* Detail blocks */
.block{background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:15px 17px;margin-bottom:14px}
.block h4{font-size:.72rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:8px}
.kv{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px dashed var(--line);font-size:.86rem}
.kv:last-child{border-bottom:none}
.kv span{color:var(--ink-soft)} .kv b{font-weight:600;text-align:right}
.timeline{list-style:none;position:relative;padding-left:22px}
.timeline:before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:2px;background:var(--line)}
.timeline li{position:relative;padding:0 0 14px 6px;font-size:.85rem}
.timeline li:before{content:'';position:absolute;left:-19px;top:5px;width:11px;height:11px;border-radius:50%;background:var(--sage);border:2px solid var(--bg-sand)}
.timeline li time{display:block;font-size:.72rem;color:var(--ink-soft);font-weight:600}

/* Form */
.field{margin-bottom:14px}
.field label{display:block;font-size:.74rem;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-soft);font-weight:600;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border-radius:12px;border:1px solid var(--line);background:var(--cream);outline:none;transition:.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--sage)}
.field textarea{min-height:72px;resize:vertical}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.empty{text-align:center;padding:50px 20px;color:var(--ink-soft)}
.empty .ic{font-size:3rem;margin-bottom:10px;opacity:.6}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink-deep);color:var(--cream);padding:13px 22px;border-radius:30px;font-size:.85rem;z-index:200;opacity:0;transition:.3s;box-shadow:var(--shadow)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:860px){
 nav.desk{display:none}
 .burger{display:none}
 .mnav{display:block}
 .sec-head h2{font-size:1.7rem}
 .hero{padding:40px 0 18px}
}
/* ===== Fonctionnalités avancées ===== */
.subt{font-size:.8rem;color:var(--ink-soft)}
.hbar .right{display:flex;align-items:center;gap:6px}
.hicon{font-size:1.2rem;padding:7px 11px;border-radius:12px;color:var(--ink-soft);transition:.2s var(--ease)}
.hicon:hover{background:rgba(125,142,116,.14);color:var(--ink-deep)}
.wcard{display:flex;align-items:center;justify-content:space-between;gap:14px;background:var(--cream);border:1px solid var(--line);border-radius:var(--r);padding:14px 18px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.wcard.noloc{border-style:dashed}
.wcard b{font-weight:600}
.wdays{display:flex;gap:8px;overflow-x:auto;margin-bottom:18px;padding-bottom:4px}
.wday{flex:0 0 auto;min-width:76px;text-align:center;background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:10px 8px;box-shadow:var(--shadow-sm)}
.wday .d{font-size:.66rem;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft)}
.wday .i{font-size:1.5rem;margin:3px 0}
.wday .t{font-size:.76rem;font-weight:600}
.wday .t .mn{color:#3d6ea5}
.wday.frost{border-color:var(--terracotta);background:rgba(195,106,75,.08)}
.frost-alert{background:rgba(195,106,75,.12);border:1px solid rgba(195,106,75,.35);color:var(--terracotta-dark);border-radius:14px;padding:13px 16px;font-size:.85rem;margin-bottom:18px;display:flex;gap:10px;align-items:flex-start}
.weekbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.weekbar .wk{flex:1;min-width:120px;background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:12px 15px;box-shadow:var(--shadow-sm)}
.weekbar .wk b{font-family:var(--primary-serif);font-size:1.9rem;color:var(--sage-dark);display:block;line-height:1}
.weekbar .wk span{font-size:.68rem;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px}
.lunar .moonrow{display:flex;align-items:center;gap:14px}
.lunar .moon{font-size:2.4rem;line-height:1}
.lunadvice{font-size:.85rem;margin-top:8px;color:var(--ink-soft)}
.plan-board{position:relative;min-height:160px;border:1px dashed rgba(125,142,116,.5);border-radius:14px;margin-top:12px;background:repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(125,142,116,.05) 38px,rgba(125,142,116,.05) 39px),repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(125,142,116,.05) 38px,rgba(125,142,116,.05) 39px)}
.plan-board .pchip.drag{position:absolute;cursor:grab;box-shadow:var(--shadow-sm);user-select:none;-webkit-user-select:none;white-space:nowrap}
.plan-board .pchip.drag:active{cursor:grabbing}
.board-empty{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--ink-soft);font-size:.84rem;text-align:center;width:84%}
.jphoto{max-width:150px;max-height:120px;border-radius:10px;margin-top:6px;cursor:pointer;border:1px solid var(--line);display:block}
.courses-add{display:flex;gap:8px;margin-bottom:14px}
.courses-add input{flex:1;padding:10px 14px;border-radius:30px;border:1px solid var(--line);background:var(--cream);outline:none}
.clist{list-style:none;margin:0;padding:0}
.clist li{display:flex;align-items:center;gap:10px;padding:10px 4px;border-bottom:1px solid var(--line);font-size:.9rem}
.clist li.done{opacity:.55;text-decoration:line-through}
.clist li .x{margin-left:auto;cursor:pointer;color:var(--ink-soft);font-size:.85rem}
.sugg-seed{display:flex;flex-wrap:wrap;gap:8px}
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}

.gcard img{width:100%;height:140px;object-fit:cover;display:block}
.gcard .cap{padding:7px 10px;font-size:.72rem;color:var(--ink-soft)}
.gcard .cap b{display:block;font-size:.8rem;color:var(--ink-deep)}
.health-item{display:flex;gap:10px;align-items:flex-start;padding:9px 0;border-bottom:1px solid var(--line);font-size:.85rem}
.health-item.resolu{opacity:.5}
.hbadge{font-size:.66rem;padding:2px 8px;border-radius:20px;background:rgba(195,106,75,.15);color:var(--terracotta-dark);font-weight:600;white-space:nowrap}
.wcumul{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.wcumul .cu{flex:1;min-width:120px;background:var(--cream);border:1px solid var(--line);border-radius:14px;padding:10px 12px;font-size:.72rem;color:var(--ink-soft);box-shadow:var(--shadow-sm)}
.wcumul .cu b{display:block;font-size:1.1rem;color:var(--soil);margin-bottom:2px}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 0;border-bottom:1px dashed var(--line)}
.set-row:last-child{border-bottom:none}
.set-row .lab b{display:block;font-weight:600}
.set-row .lab span{font-size:.8rem;color:var(--ink-soft)}
@media print{
 .toast,.overlay,.mnav{display:none!important}
 @page{margin:13mm}
 body{padding:0!important;background:#fff}
 .btn,.chip,.close,.hicon,.burger,.toolbar{display:none!important}

 .card,.block,.parcelle,.wday,table.cal{break-inside:avoid}
}

const IMG_CACHE='potager_imgcache_v1';
let imgCache=load(IMG_CACHE,{});
function upscaleImg(u){try{if(typeof u==='string'&&/\/thumb\//.test(u))return u.replace(/\/(\d+)px-/,function(m,n){return '/'+Math.max(parseInt(n,10),640)+'px-';});}catch(_){}return u;}
function applyImg(img,orig){img.classList.remove('on');img.onload=function(){img.classList.add('on');};img.__fb=0;img.onerror=function(){if(!img.__fb){img.__fb=1;img.onerror=null;img.src=orig;}};img.src=upscaleImg(orig);}
function loadVegImg(v,img){
 const c=imgCache[v.id];
 if(c){applyImg(img,c);return;}
 if(c===null)return;
 const title=WIKI[v.id]||v.nom;
 fetch('https://fr.wikipedia.org/api/rest_v1/page/summary/'+encodeURIComponent(title)).then(r=>r.json()).then(d=>{const src=(d.thumbnail&&d.thumbnail.source)||(d.originalimage&&d.originalimage.source);if(src){imgCache[v.id]=src;save(IMG_CACHE,imgCache);applyImg(img,src);}else{imgCache[v.id]=null;save(IMG_CACHE,imgCache);}}).catch(()=>{});
}
function hydrateImages(){document.querySelectorAll('img.vimg:not([data-h])').forEach(img=>{img.setAttribute('data-h','1');const v=vegById(img.getAttribute('data-vid'));if(v)loadVegImg(v,img);});}
function vegThumb(v){var e='🌱';try{if(v)e=emo(v)||'🌱';}catch(_){}var id=(v&&v.id)||'';return `<span class="vthumb"${id?` onclick="openImg('${id}',event)"`:''}><span class="emo">${e}</span><img class="vimg" data-vid="${id}" draggable="false" alt=""></span>`;}
function openImg(id,ev){if(ev){ev.stopPropagation();}var v=vegById(id);if(!v&&typeof allVeg==='function')v=allVeg().find(function(x){return x.id===id;});if(!v)return;closeImg();var box=document.createElement('div');box.className='imgbox';box.id='imgbox';box.onclick=closeImg;box.innerHTML='<div class="imgbox-inner" onclick="event.stopPropagation()"><button class="imgbox-x" onclick="closeImg()" aria-label="Fermer">✕</button><div class="imgbox-photo"><span class="emo">'+(emo(v)||'🌱')+'</span><img class="vimg" data-vid="'+v.id+'" alt=""></div><div class="imgbox-cap"><b>'+esc(v.nom)+'</b><small>'+esc(v.lat||'')+'</small></div></div>';document.body.appendChild(box);hydrateImages();requestAnimationFrame(function(){box.classList.add('on');});}

/* ===================== HELPERS ===================== */
const $=s=>document.querySelector(s);
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function allVeg(){return VEG.concat(state.customVeg);}
function vegById(id){return allVeg().find(v=>v.id===id);}
function parcById(id){return state.parcelles.find(p=>p.id===id);}
function emo(v){return (v&&EMO[v.id])||'🌱';}
function addDays(d,n){const x=new Date(d);x.setDate(x.getDate()+n);return x;}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function fmtDate(d){return new Date(d).toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
function todayISO(){return new Date().toISOString().slice(0,10);}
function uid(){return Math.random().toString(36).slice(2,9);}
function monthsInRange(a){if(!a||a.length<2)return[];let[s,e]=a,res=[],m=s;for(let i=0;i<12;i++){res.push(m);if(m===e)break;m=m%12+1;}return res;}
function rangeLabel(a){if(!a||a.length<2)return'—';return MONTHS[a[0]-1]+' → '+MONTHS[a[1]-1];}
function plantName(p){const v=vegById(p.vegId);return p.variete?p.variete:(v?v.nom:'Culture');}
function plantVegName(p){const v=vegById(p.vegId);return v?v.nom:'';}
function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2200);}

function cultivationProgress(p){const v=vegById(p.vegId);if(!p.dateSemis||!v||!v.delai)return 0;const d=daysBetween(p.dateSemis,NOW);return Math.max(0,Math.min(100,Math.round(d/v.delai*100)));}
function harvestDate(p){const v=vegById(p.vegId);if(!p.dateSemis||!v||!v.delai)return null;return addDays(p.dateSemis,v.delai);}
const STATUTS={seme:'Semé / planté',croissance:'En croissance',recolte:'En récolte',termine:'Terminé'};
function statutClass(s){return 'st-'+s;}
function statutBadge(p){const s=p.statut||'seme';return `<span class="status ${statutClass(s)}"><span class="dot"></span>${STATUTS[s]}</span>`;}

 document.querySelectorAll('main .view').forEach(s=>s.classList.add('hidden'));

/* ===================== MON POTAGER ===================== */
function renderPotager(){
 const active=state.plants.filter(p=>p.statut!=='termine');
 let body=`<div class="sec-head"><div><h2>Mon Potager</h2><div class="sub">${active.length} culture(s) en cours · saison ${CUR_YEAR}</div></div><button class="btn btn-primary btn-sm" onclick="openAddCulture()">＋ Ajouter une culture</button></div>`;
 body+='<div id="pot-weather"></div>';
 if(!state.plants.length){body+=emptyState('🌱','Aucune culture pour l\'instant','Ajoutez votre première culture depuis le catalogue ou le bouton ci-dessus.');$('#v-potager').innerHTML=body;return;}
 const tasks=computeTasks();
 body+='<div class="grid">';
 state.plants.slice().sort((a,b)=>(a.statut==='termine')-(b.statut==='termine')).forEach(p=>{
  const v=vegById(p.vegId);const prog=cultivationProgress(p);const parc=parcById(p.parcelleId);
  const nextTask=tasks.find(t=>t.plant&&t.plant.id===p.id);
  body+=`<div class="card" onclick="openPlant('${p.id}')">
   <div class="ph" onclick="openImg('${(v&&v.id)||''}',event)"><span class="emo">${emo(v)}</span><img class="vimg" data-vid="${(v&&v.id)||''}" alt=""></div>
   <h3>${esc(plantName(p))}</h3>
   <div class="lat">${p.variete?esc(plantVegName(p)):esc((vegById(p.vegId)||{}).lat||'')}</div>
   ${statutBadge(p)}
   <div class="metaline"><span>📍 <b>${esc(parc?parc.nom:'—')}</b></span><span>🗓️ semé ${p.dateSemis?fmtDate(p.dateSemis):'—'}</span></div>
   <div class="prog"><i style="width:${prog}%"></i></div>
   <div class="metaline"><span>${prog}% du cycle</span>${nextTask?`<span>${nextTask.icon} <b>${nextTask.short}</b></span>`:''}</div>
  </div>`;
 });
 body+='</div>';
 $('#v-potager').innerHTML=body;hydrateImages();renderWeather('#pot-weather');
}

function openPlant(id){
 const p=state.plants.find(x=>x.id===id);if(!p)return;const v=vegById(p.vegId);const parc=parcById(p.parcelleId);
 const hd=harvestDate(p);const totalHarvest=(p.recoltes||[]).reduce((s,r)=>s+(parseFloat(r.qte)||0),0);
 let html=`
  ${statutBadge(p)}
  <div class="block" style="margin-top:14px">
   <h4>Suivi</h4>
   <div class="kv"><span>Parcelle</span><b>${esc(parc?parc.nom:'—')}</b></div>
   <div class="kv"><span>Variété</span><b>${esc(p.variete||'(type)')}</b></div>
   ${p.fournisseur?`<div class="kv"><span>Fournisseur</span><b>${esc(p.fournisseur)}</b></div>`:''}
   ${p.germTaux!=null?`<div class="kv"><span>Germination (lot)</span><b>${p.germTaux}%</b></div>`:''}
   <div class="kv"><span>Semé / planté le</span><b>${p.dateSemis?fmtDate(p.dateSemis):'—'}</b></div>
   <div class="kv"><span>Récolte estimée</span><b>${hd?fmtDate(hd):'—'}</b></div>
   <div class="kv"><span>Progression</span><b>${cultivationProgress(p)}%</b></div>
   <div class="kv"><span>Arrosage tous les</span><b>${p.arrosInterval||(v?v.arros:'—')} j</b></div>
   <div class="kv"><span>Dernier arrosage</span><b>${p.lastWater?fmtDate(p.lastWater):'jamais'}</b></div>
  </div>
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">
   <button class="btn btn-primary btn-sm" onclick="waterPlant('${p.id}')">💧 J'ai arrosé</button>
   <button class="btn btn-ghost btn-sm" onclick="openJournalAdd('${p.id}')">✍️ Note / étape</button>
   <button class="btn btn-terra btn-sm" onclick="openHarvestAdd('${p.id}')">🧺 Récolte</button>
   <button class="btn btn-ghost btn-sm" onclick="openHealthAdd('${p.id}')">🐛 Problème</button>
  </div>
  <div class="block"><h4>Changer le statut</h4>
   <div style="display:flex;gap:6px;flex-wrap:wrap">${Object.entries(STATUTS).map(([k,l])=>`<button class="chip ${p.statut===k?'active':''}" onclick="setStatut('${p.id}','${k}')">${l}</button>`).join('')}</div>
  </div>`+healthSection(p);
 if(totalHarvest>0){html+=`<div class="block"><h4>Récoltes — total ${totalHarvest} ${esc((p.recoltes[0]||{}).unite||'')}</h4><ul class="timeline">${p.recoltes.slice().reverse().map(r=>`<li><time>${fmtDate(r.date)}</time>${r.qte} ${esc(r.unite||'')} ${r.note?'· '+esc(r.note):''}</li>`).join('')}</ul></div>`;}
 const jr=(p.journal||[]).slice().reverse();
 html+=`<div class="block"><h4>Journal de culture</h4>${jr.length?`<ul class="timeline">${jr.map(j=>{const idx=p.journal.indexOf(j);return `<li><time>${fmtDate(j.date)} · ${esc(j.type)}</time>${esc(j.note||'')}${j.photo?`<br><img class="jphoto" src="${j.photo}" onclick="openJournalPhoto('${p.id}',${idx})">`:''}</li>`;}).join('')}</ul>`:'<div class="sub" style="color:var(--ink-soft);font-size:.85rem">Aucune entrée. Notez vos étapes (repiquage, traitement, observation…).</div>'}</div>`;
 if(v)html+=`<div class="block"><h4>Rappel fiche</h4><div class="kv"><span>Conseil</span><b style="text-align:right;max-width:60%">${esc(v.cons)}</b></div><div class="kv"><span>Ravageurs</span><b>${esc(v.rav)}</b></div></div>`;
 html+=`<button class="btn btn-ghost btn-sm" style="color:var(--terracotta-dark);border-color:rgba(195,106,75,.4)" onclick="deletePlant('${p.id}')">🗑️ Supprimer cette culture</button>`;
 openDrawer(`<h2>${esc(plantName(p))}</h2><div class="lat">${esc(plantVegName(p))}</div>`,html);
}
function waterPlant(id){const p=state.plants.find(x=>x.id===id);p.lastWater=todayISO();(p.journal=p.journal||[]).push({date:todayISO(),type:'Arrosage',note:''});persist();toast('💧 Arrosage enregistré');openPlant(id);if(currentView==='potager')renderPotager();if(currentView==='taches')renderTaches();}
function setStatut(id,s){const p=state.plants.find(x=>x.id===id);p.statut=s;(p.journal=p.journal||[]).push({date:todayISO(),type:'Statut',note:STATUTS[s]});persist();toast('Statut mis à jour');openPlant(id);}
function deletePlant(id){if(!confirm('Supprimer définitivement cette culture et son journal ?'))return;state.plants=state.plants.filter(x=>x.id!==id);persist();closeAll();toast('Culture supprimée');go(currentView);}
function openJournalAdd(id){openModal('Ajouter au journal',`
 <div class="field"><label>Type d'étape</label><select id="jType">${['Observation','Repiquage','Buttage','Traitement','Désherbage','Taille','Fertilisation','Autre'].map(t=>`<option>${t}</option>`).join('')}</select></div>
 <div class="field"><label>Date</label><input type="date" id="jDate" value="${todayISO()}"></div>
 <div class="field"><label>Note</label><textarea id="jNote" placeholder="Détails de l'observation ou de l'intervention…"></textarea></div>
 <div class="field"><label>Photo (facultatif)</label><input type="file" id="jPhoto" accept="image/*"></div>
 <button class="btn btn-primary" onclick="saveJournal('${id}')">Enregistrer</button>`);}
function saveJournal(id){const p=state.plants.find(x=>x.id===id);const entry={date:$('#jDate').value||todayISO(),type:$('#jType').value,note:$('#jNote').value};const fi=$('#jPhoto');const f=fi&&fi.files[0];const done=function(){(p.journal=p.journal||[]).push(entry);persist();toast('Note ajoutée');openPlant(id);};if(f){toast('🖼️ Traitement de la photo…');compressImage(f,900,function(d){if(d)entry.photo=d;done();});}else done();}
function openHarvestAdd(id){openModal('Enregistrer une récolte',`
 <div class="row2"><div class="field"><label>Quantité</label><input type="number" id="hQte" step="0.1" placeholder="ex. 1.5"></div><div class="field"><label>Unité</label><select id="hUnite"><option>kg</option><option>g</option><option>pièces</option><option>bottes</option><option>litres</option></select></div></div>
 <div class="field"><label>Date</label><input type="date" id="hDate" value="${todayISO()}"></div>
 <div class="field"><label>Note</label><input id="hNote" placeholder="facultatif"></div>
 <button class="btn btn-terra" onclick="saveHarvest('${id}')">🧺 Enregistrer la récolte</button>`);}
function saveHarvest(id){const p=state.plants.find(x=>x.id===id);(p.recoltes=p.recoltes||[]).push({date:$('#hDate').value||todayISO(),qte:$('#hQte').value,unite:$('#hUnite').value,note:$('#hNote').value});if(p.statut==='croissance'||p.statut==='seme')p.statut='recolte';persist();toast('🧺 Récolte enregistrée');openPlant(id);}

function healthSection(p){
 const probs=(p.problemes||[]);

/* ===================== TÂCHES & RAPPELS ===================== */
function computeTasks(){
 let tasks=[];
 state.plants.filter(p=>p.statut!=='termine').forEach(p=>{
  const v=vegById(p.vegId);const interval=p.arrosInterval||(v?v.arros:4);
  let next,days;
  if(p.lastWater){next=addDays(p.lastWater,interval);days=daysBetween(NOW,next);}else{next=NOW;days=0;}
  tasks.push({type:'arrosage',plant:p,date:next,days,icon:'💧',short:days<=0?'à arroser':'arroser dans '+days+'j',label:'Arroser — '+plantName(p),sub:(parcById(p.parcelleId)||{}).nom+' · tous les '+interval+' j'});
  const hd=harvestDate(p);
  if(hd&&p.statut!=='recolte'){const hdy=daysBetween(NOW,hd);if(hdy<=14)tasks.push({type:'recolte',plant:p,date:hd,days:hdy,icon:'🧺',short:hdy<=0?'à récolter':'récolte dans '+hdy+'j',label:'Récolte proche — '+plantName(p),sub:(parcById(p.parcelleId)||{}).nom});}
 });
 // suggestions de semis du mois
 allVeg().forEach(v=>{if(monthsInRange(v.semis).includes(CUR_MONTH)){const already=state.plants.some(p=>p.vegId===v.id&&p.annee===CUR_YEAR);if(!already)tasks.push({type:'semis',veg:v,date:NOW,days:0,icon:'🌱',short:'à semer',label:'À semer ce mois — '+v.nom,sub:v.mode+' · '+v.fam,suggestion:true});}});
 // tâches manuelles
 state.tasks.filter(t=>!t.done).forEach(t=>{const days=daysBetween(NOW,t.date);tasks.push({type:'manuel',taskId:t.id,date:new Date(t.date),days,icon:'📌',short:days<=0?'à faire':'dans '+days+'j',label:t.label,sub:'Tâche personnelle'});});
 tasks.sort((a,b)=>a.date-b.date);
 return tasks;
}

 const actions=tasks.filter(t=>!t.suggestion);
 const sugg=tasks.filter(t=>t.suggestion);
 let body=`<div class="sec-head"><div><h2>Tâches & rappels</h2><div class="sub">${actions.filter(t=>t.days<=0).length} à faire maintenant</div></div><button class="btn btn-ghost btn-sm" onclick="openAddTask()">＋ Tâche perso</button></div>`;
 body+='<div id="tach-weather"></div>'+weekSummary()+lunarWidget();

 else body+=emptyState('✅','Rien d\'urgent','Aucune tâche en attente. Ajoutez des cultures pour générer des rappels.');
 if(sugg.length){body+=`<h3 class="serif" style="margin:28px 0 14px;font-size:1.5rem">🌱 À semer en ${MONTHS_FULL[CUR_MONTH]}</h3><div class="tasklist">`+sugg.slice(0,12).map(t=>`<div class="task"><div class="ti">${t.icon}</div><div class="body"><b>${esc(t.veg.nom)}</b><small>${esc(t.sub)}</small></div><button class="btn btn-primary btn-sm" onclick="openAddCulture('${t.veg.id}')">Semer</button></div>`).join('')+'</div>';}

/* ===================== PLAN & ROTATION ===================== */
function rotationInfo(parcelleId){
 let famYears={};
 state.plants.filter(p=>p.parcelleId===parcelleId).forEach(p=>{const v=vegById(p.vegId);if(!v)return;(famYears[v.fam]=famYears[v.fam]||new Set()).add(p.annee);});
 let warns=[];
 Object.entries(famYears).forEach(([f,set])=>{const ys=[...set].sort((a,b)=>a-b);for(let i=1;i<ys.length;i++){if(ys[i]-ys[i-1]<3){warns.push(f+' présente en '+ys[i-1]+' et '+ys[i]+' — respecter ~3 ans avant d\'y revenir.');break;}}});
 return warns;
}
function companionConflicts(here){
 var out=[];
 for(var i=0;i<here.length;i++){for(var j=0;j<here.length;j++){if(i===j)continue;
  var a=vegById(here[i].vegId),b=vegById(here[j].vegId);if(!a||!b)continue;
  var bn=b.nom.toLowerCase();
  if((a.anti||[]).some(function(c){return bn.indexOf(c.toLowerCase())>=0||c.toLowerCase().indexOf(bn)>=0;})){
   var pair=[plantName(here[i]),plantName(here[j])].sort().join(' ✕ ');
   if(out.indexOf(pair)<0)out.push(pair);
  }
 }}
 return out;
}
function rotationNext(){
 var cycle=['Légume-feuille','Légume-fruit','Légume-racine','Légumineuse'];
 var body='<div class="block" style="margin-top:8px"><h4>🔄 Préparer la rotation '+(CUR_YEAR+1)+'</h4>';
 var any=false;
 state.parcelles.forEach(function(pa){

 });

 if(settings.lat==null){el.innerHTML='<div class="wcard noloc"><div><b>🌦️ Météo & alerte gel</b><div class="subt">Activez votre localisation pour les prévisions sur 7 jours et les alertes de gel.</div></div><button class="btn btn-ghost btn-sm" onclick="setLocation()">📍 Activer</button></div>';return;}

 });

function moonInfo(date){
 const lunar=29.53058867;const ref=Date.UTC(2000,0,6,18,14,0);
 let age=((((date.getTime()-ref)/86400000)%lunar)+lunar)%lunar;
 const illum=Math.round((1-Math.cos(2*Math.PI*age/lunar))/2*100);
 let phase,emoji;
 if(age<1.85){phase='Nouvelle lune';emoji='🌑';}
 else if(age<5.54){phase='Premier croissant';emoji='🌒';}
 else if(age<9.23){phase='Premier quartier';emoji='🌓';}
 else if(age<12.92){phase='Gibbeuse croissante';emoji='🌔';}
 else if(age<16.61){phase='Pleine lune';emoji='🌕';}
 else if(age<20.30){phase='Gibbeuse décroissante';emoji='🌖';}
 else if(age<23.99){phase='Dernier quartier';emoji='🌗';}
 else if(age<27.68){phase='Dernier croissant';emoji='🌘';}
 else{phase='Nouvelle lune';emoji='🌑';}
 return {age:age,illum:illum,phase:phase,emoji:emoji,waxing:age<14.77};
}

 const c=m.waxing?'Lune croissante — favorable aux semis, repiquages et à la récolte des parties aériennes (feuilles, fruits).':'Lune décroissante — favorable aux semis de légumes-racines, aux plantations, à la taille, au désherbage et au travail du sol.';
 return '<div class="block lunar"><h4>Calendrier lunaire</h4><div class="moonrow"><div class="moon">'+m.emoji+'</div><div><b>'+m.phase+'</b><div class="subt">'+m.illum+'% illuminée · jour '+Math.round(m.age)+' du cycle lunaire</div></div></div><p class="lunadvice">'+c+'</p></div>';
}
function weekSummary(){
 const tasks=computeTasks();const act=tasks.filter(function(t){return !t.suggestion;});
 const now=act.filter(function(t){return t.days<=0;}).length;
 const wk=act.filter(function(t){return t.days>0&&t.days<=7;}).length;
 const water=act.filter(function(t){return t.type==='arrosage'&&t.days<=7;}).length;
 const sow=tasks.filter(function(t){return t.suggestion;}).length;
 return '<div class="weekbar"><div class="wk"><b>'+now+'</b><span>À faire maintenant</span></div><div class="wk"><b>'+wk+'</b><span>Dans 7 jours</span></div><div class="wk"><b>'+water+'</b><span>Arrosages (7j)</span></div><div class="wk"><b>'+sow+'</b><span>À semer ce mois</span></div></div>';
}

function openStagger(vegId){const v=vegById(vegId);if(!v)return;openModal('Semis échelonnés — '+v.nom,`<p class="subt" style="margin-bottom:12px">Planifiez plusieurs semis espacés pour étaler les récoltes (idéal pour radis, salades, haricots, carottes…).</p><div class="row2"><div class="field"><label>Première date</label><input type="date" id="stDate" value="${todayISO()}"></div><div class="field"><label>Intervalle (jours)</label><input type="number" id="stInt" value="14" min="3"></div></div><div class="field"><label>Nombre de vagues</label><input type="number" id="stN" value="4" min="2" max="12"></div><button class="btn btn-primary" onclick="saveStagger('${v.id}')">📆 Créer les rappels</button>`);}
function saveStagger(vegId){const v=vegById(vegId);if(!v)return;const start=$('#stDate').value||todayISO();const intv=Math.max(1,+$('#stInt').value||14);const n=Math.max(1,Math.min(12,+$('#stN').value||4));for(let i=0;i<n;i++){state.tasks.push({id:uid(),label:'Semer '+v.nom+' — vague '+(i+1)+'/'+n,date:addDays(start,i*intv).toISOString().slice(0,10),done:false});}persist();closeAll();toast('📆 '+n+' rappels de semis créés');go('taches');}

function compressImage(file,maxW,cb){
 const reader=new FileReader();
 reader.onload=function(){const img=new Image();img.onload=function(){const sc=Math.min(1,maxW/img.width);const c=document.createElement('canvas');c.width=Math.round(img.width*sc);c.height=Math.round(img.height*sc);c.getContext('2d').drawImage(img,0,0,c.width,c.height);try{cb(c.toDataURL('image/jpeg',0.7));}catch(e){cb(null);}};img.onerror=function(){cb(null);};img.src=reader.result;};
 reader.onerror=function(){cb(null);};
 reader.readAsDataURL(file);
}
function openJournalPhoto(pid,idx){const p=state.plants.find(function(x){return x.id===pid;});if(!p)return;const j=(p.journal||[])[idx];if(j&&j.photo)openModal('Photo — '+fmtDate(j.date),'<img style="width:100%;border-radius:14px" src="'+j.photo+'">');}

function enableNotif(){
 if(!('Notification' in window)){toast('Notifications non supportées par ce navigateur');return;}
 Notification.requestPermission().then(function(p){settings.notif=(p==='granted');saveSettings();if(settings.notif){toast('🔔 Notifications activées');notifyDue();}else{toast('Notifications refusées');}if(currentView==='reglages')renderReglages();});
}
function notifyDue(){
 if(!settings.notif||!('Notification' in window)||Notification.permission!=='granted')return;
 const due=computeTasks().filter(function(t){return !t.suggestion&&t.days<=0;});
 if(due.length){try{new Notification('🌱 Potager — '+due.length+' tâche(s) à faire',{body:due.slice(0,4).map(function(t){return t.label;}).join(' �� ')});}catch(e){}}
}

let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferredPrompt=e;});
function setupPWA(){
 try{
  const svg='<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512"><rect width="512" height="512" rx="96" fill="#5c6e54"/><text x="50%" y="54%" font-size="300" text-anchor="middle" dominant-baseline="middle">🥕</text></svg>';
  const manifest={name:'Le Carnet du Potager',short_name:'Potager',start_url:'.',display:'standalone',background_color:'#FAF7F2',theme_color:'#5c6e54',icons:[{src:'data:image/svg+xml,'+encodeURIComponent(svg),sizes:'512x512',type:'image/svg+xml'}]};
  const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
  const link=document.createElement('link');link.rel='manifest';link.href=URL.createObjectURL(blob);document.head.appendChild(link);
 }catch(e){}
}
function installApp(){
 if(deferredPrompt){deferredPrompt.prompt();if(deferredPrompt.userChoice)deferredPrompt.userChoice.finally(function(){deferredPrompt=null;});}
 else{toast('Ouvrez le menu du navigateur puis « Installer l’application » / « Ajouter à l’écran d’accueil ».');}
}
function printDrawer(){document.body.classList.add('print-drawer');window.print();setTimeout(function(){document.body.classList.remove('print-drawer');},600);}

const PRIX={tomate:3,courgette:2.5,concombre:2,poivron:4,aubergine:3,haricot:5,pois:6,feve:4,laitue:3,epinard:4,mache:8,roquette:10,carotte:1.5,radis:3,betterave:2.5,navet:2,pdt:1.5,oignon:1.8,ail:8,echalote:5,poireau:2.5,chou:1.8,chouflr:2.5,brocoli:3.5,courge:1.8,potimarron:2,melon:2.5,fraise:8,basilic:30,persil:15,ciboulette:20,thym:25,menthe:15,coriandre:18,celeri:2.5,fenouil:3,blette:2.5,mais:2,artichaut:4,endive:3};
function harvestKg(p){return (p.recoltes||[]).reduce(function(a,r){const q=parseFloat(r.qte)||0;return a+(r.unite==='g'?q/1000:(r.unite==='kg'?q:0));},0);}
function economies(){let byVeg={},total=0;state.plants.forEach(function(p){const kg=harvestKg(p);if(kg>0){const prix=PRIX[p.vegId]||2.5;const val=kg*prix;total+=val;const n=plantVegName(p)||plantName(p);byVeg[n]=(byVeg[n]||0)+val;}});return {total:total,byVeg:byVeg};}

function planDragStart(e,id){if(e.dataTransfer){e.dataTransfer.setData('text/plain',id);e.dataTransfer.effectAllowed='move';}}
function planDrop(e,parcId){e.preventDefault();const id=e.dataTransfer?e.dataTransfer.getData('text/plain'):null;const p=state.plants.find(function(x){return x.id===id;});if(!p)return;const rect=e.currentTarget.getBoundingClientRect();let x=(e.clientX-rect.left)/rect.width*100;let y=(e.clientY-rect.top)/rect.height*100;x=Math.max(2,Math.min(90,x));y=Math.max(2,Math.min(86,y));p.pos={x:+x.toFixed(1),y:+y.toFixed(1)};p.parcelleId=parcId;persist();renderPlan();}

function renderReglages(){
 let body='<div class="sec-head"><div><h2>Réglages & sauvegarde</h2><div class="sub">Données, localisation, notifications, installation</div></div></div>';
 body+='<div class="block"><h4>Sauvegarde des données</h4><p class="subt" style="margin-bottom:10px">Vos données restent dans ce navigateur. Exportez régulièrement pour ne rien perdre (changement d’appareil, nettoyage du cache…) et réimportez-les ailleurs.</p><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-primary btn-sm" onclick="exportData()">💾 Exporter (JSON)</button><label class="btn btn-ghost btn-sm">📂 Importer<input type="file" accept="application/json" style="display:none" onchange="importFile(this)"></label></div></div>';
 body+='<div class="block"><h4>Localisation & météo</h4><div class="set-row"><div class="lab"><b>Position</b><span>'+(settings.lat!=null?('📍 '+settings.lat+', '+settings.lon):'Non définie')+'</span></div><button class="btn btn-ghost btn-sm" onclick="setLocation()">'+(settings.lat!=null?'Actualiser':'Activer')+'</button></div></div>';
 body+='<div class="block"><h4>Notifications</h4><div class="set-row"><div class="lab"><b>Rappels du navigateur</b><span>'+(settings.notif?'Activées':'Désactivées')+'</span></div><button class="btn btn-ghost btn-sm" onclick="enableNotif()">'+(settings.notif?'Re-tester':'Activer')+'</button></div></div>';
 body+='<div class="block"><h4>Installer l’application</h4><div class="set-row"><div class="lab"><b>Mode application</b><span>Sur l’écran d’accueil / le bureau · fonctionne hors-ligne</span></div><button class="btn btn-ghost btn-sm" onclick="installApp()">📲 Installer</button></div></div>';
 body+=lunarWidget();
 body+='<div class="block"><h4>Zone sensible</h4><button class="btn btn-ghost btn-sm" style="color:var(--terracotta-dark);border-color:rgba(195,106,75,.4)" onclick="resetAll()">🗑️ Tout réinitialiser</button></div>';
 $('#v-reglages').innerHTML=body;
}
function resetAll(){if(!confirm('Effacer TOUTES vos données (cultures, parcelles, tâches, réglages) ? Cette action est irréversible.'))return;[LS.plants,LS.parc,LS.custom,LS.tasks,LS.courses,SET,IMG_CACHE].forEach(function(k){localStorage.removeItem(k);});location.reload();}

/* ===================== DIVERS ===================== */
function emptyState(ic,t,s){return `<div class="empty"><div class="ic">${ic}</div><h3 style="font-size:1.4rem;margin-bottom:6px">${esc(t)}</h3><p>${esc(s)}</p></div>`;}
function renderHeroStats(){
 const active=state.plants.filter(p=>p.statut!=='termine').length;
 $('#heroStats').innerHTML=`<div class="s"><b>${allVeg().length}</b><span>Légumes au catalogue</span></div><div class="s"><b>${active}</b><span>Cultures en cours</span></div><div class="s"><b>${state.parcelles.length}</b><span>Parcelles</span></div>`;
}
$('#burger').onclick=()=>go('potager');

/* ===================== INIT ===================== */
setupPWA();buildNav();renderHeroStats();go('hero');if(settings.notif)setTimeout(notifyDue,1500);
</script>
